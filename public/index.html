<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Resultados Golf</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #fff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --primary: #0f766e;
      --primary-light: #ccfbf1;
      --shadow: 0 4px 20px rgba(0,0,0,.08);
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    
    .header { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #fff; padding: 40px 20px; text-align: center; }
    .header h1 { font-size: 36px; margin-bottom: 8px; }
    .header p { color: #94a3b8; font-size: 16px; }
    
    .main { max-width: 1000px; margin: 0 auto; padding: 32px 20px; }
    
    .section-title { font-size: 14px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
    
    .eventos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-bottom: 40px; }
    
    .evento-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; transition: transform .2s, box-shadow .2s; }
    .evento-card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,0,0,.12); }
    .evento-card a { text-decoration: none; color: inherit; display: block; }
    .evento-header { background: linear-gradient(135deg, var(--primary), #0891b2); padding: 24px; color: #fff; }
    .evento-header h3 { font-size: 20px; margin-bottom: 4px; }
    .evento-header .fecha { font-size: 13px; opacity: .8; }
    .evento-body { padding: 20px; }
    .evento-meta { display: flex; gap: 16px; flex-wrap: wrap; font-size: 13px; color: var(--muted); margin-bottom: 16px; }
    .evento-meta span { display: flex; align-items: center; gap: 6px; }
    .evento-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .stat { text-align: center; padding: 12px; background: #f8fafc; border-radius: 10px; }
    .stat .value { font-size: 24px; font-weight: 700; color: var(--primary); }
    .stat .label { font-size: 11px; color: var(--muted); text-transform: uppercase; }
    .evento-actions { display: flex; gap: 8px; margin-top: 16px; }
    .evento-actions a { flex: 1; padding: 10px; text-align: center; border-radius: 8px; font-size: 13px; font-weight: 600; text-decoration: none; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-secondary { background: #f1f5f9; color: var(--text); }
    
    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-state .icon { font-size: 64px; margin-bottom: 16px; }
    .empty-state h3 { font-size: 20px; margin-bottom: 8px; }
    .empty-state p { color: var(--muted); }
    
    .loading { text-align: center; padding: 60px; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--line); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .admin-link { position: fixed; bottom: 24px; right: 24px; background: var(--primary); color: #fff; padding: 14px 24px; border-radius: 30px; text-decoration: none; font-weight: 600; box-shadow: 0 4px 12px rgba(15,118,110,.3); display: flex; align-items: center; gap: 8px; }
    .admin-link:hover { background: #0d6459; }
  </style>
</head>
<body>
  <header class="header">
    <h1>⛳ Resultados Golf</h1>
    <p>Selecciona un torneo para ver el leaderboard en vivo</p>
  </header>
  
  <main class="main">
    <h2 class="section-title">Torneos Activos</h2>
    
    <div id="eventosContainer" class="eventos-grid">
      <div class="loading">
        <div class="spinner"></div>
        Cargando torneos...
      </div>
    </div>
  </main>
  
  <a href="/admin-eventos.html" class="admin-link">⚙️ Administrar</a>

<script>
(async function() {
  const container = document.getElementById('eventosContainer');
  
  try {
    const res = await fetch('/api/eventos?activos=true');
    const data = await res.json();
    
    if (!data.ok || !data.eventos?.length) {
      container.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1;">
          <div class="icon">🏌️</div>
          <h3>No hay torneos activos</h3>
          <p>Crea un nuevo torneo desde el panel de administración</p>
        </div>
      `;
      return;
    }
    
    container.innerHTML = data.eventos.map(e => {
      const fechas = e.fecha_inicio ? 
        `${formatDate(e.fecha_inicio)}${e.fecha_fin && e.fecha_fin !== e.fecha_inicio ? ' - ' + formatDate(e.fecha_fin) : ''}` : 
        'Fecha por definir';
      
      return `
        <div class="evento-card">
          <a href="/resultados.html?evento=${encodeURIComponent(e.slug)}">
            <div class="evento-header">
              <h3>${e.titulo}</h3>
              <div class="fecha">📅 ${fechas}</div>
            </div>
            <div class="evento-body">
              <div class="evento-meta">
                <span>🏆 ${formatFormato(e.formato_juego)}</span>
                <span>📋 ${e.num_rondas || 1} ronda(s)</span>
                ${e.live_scoring ? '<span style="color:#16a34a;">🔴 Live</span>' : ''}
              </div>
              <div class="evento-actions">
                <a href="/resultados.html?evento=${encodeURIComponent(e.slug)}" class="btn-primary">Ver Leaderboard</a>
                ${e.live_scoring ? `<a href="/livescoring.html?evento=${encodeURIComponent(e.slug)}" class="btn-secondary">Live Scoring</a>` : ''}
              </div>
            </div>
          </a>
        </div>
      `;
    }).join('');
    
  } catch (err) {
    container.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1;">
        <div class="icon">⚠️</div>
        <h3>Error cargando torneos</h3>
        <p>${err.message}</p>
      </div>
    `;
  }
  
  function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr + 'T12:00:00');
    return d.toLocaleDateString('es-CL', { day: 'numeric', month: 'short' });
  }
  
  function formatFormato(f) {
    const map = {
      'stroke_play': 'Stroke Play',
      'stableford': 'Stableford',
      'match_play': 'Match Play',
      'fourball': 'Fourball'
    };
    return map[f] || f || 'Stroke Play';
  }
})();
</script>
</body>
</html>
